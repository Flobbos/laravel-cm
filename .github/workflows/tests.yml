name: Tests

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4']
        laravel: [11, 12, 13]
        include:
          - laravel: 11
            testbench: 9
          - laravel: 12
            testbench: 10
          - laravel: 13
            testbench: 11
        exclude:
          # Laravel 13 requires PHP 8.3+
          - laravel: 13
            php: '8.2'

    name: PHP ${{ matrix.php }} - Laravel ${{ matrix.laravel }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pdo, sqlite, pdo_sqlite
          tools: composer:v2
          coverage: none

      - name: Pin Laravel / Testbench for this matrix cell
        run: composer require "orchestra/testbench:^${{ matrix.testbench }}.0" --dev --no-interaction --no-update

      - name: Install dependencies
        run: composer update --prefer-stable --prefer-dist --no-interaction

      - name: Run tests
        run: vendor/bin/pest
